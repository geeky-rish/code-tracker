<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Placement Quest — GitHub-Powered DSA Tracker</title>
  <meta name="description" content="A zero-backend, high-aesthetic DSA progress tracker for software engineering placement prep.">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Sticky Navbar -->
  <nav id="navbar" class="navbar"></nav>

  <!-- Main Container -->
  <main class="main-content">
    <div class="container">
      
      <!-- Hero Section -->
      <section class="hero-section">
        <div class="hero-header">
          <div class="hero-welcome">
            <h1>Welcome Back, Candidate 🚀</h1>
            <p>Infosys OA Hit List — 20-Day Mastery Quest</p>
          </div>
        </div>

        <div id="hero-grid" class="hero-grid"></div>

        <div id="xp-banner" class="xp-banner"></div>
      </section>

      <!-- Main Dashboard Grid -->
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;" class="dashboard-grid">
        
        <!-- Left Column: Today's Mission -->
        <div class="card">
          <div class="card-title">
            <span>🎯 Today's Mission</span>
            <span class="badge" style="background: rgba(14, 165, 233, 0.15); color: var(--primary);">Daily Checklist</span>
          </div>
          <div id="mission-list" class="mission-list"></div>
        </div>

        <!-- Right Column: Boss Battle & Heatmap -->
        <div style="display: flex; flex-direction: column; gap: 24px;">
          
          <div id="boss-battle-container"></div>

          <!-- Heatmap Card -->
          <div class="card">
            <div class="card-title">
              <span>🟩 Study Heatmap</span>
              <span class="badge" style="background: rgba(16, 185, 129, 0.15); color: var(--emerald);">GitHub Style</span>
            </div>
            <div class="heatmap-container">
              <div id="heatmap-grid" class="heatmap-grid"></div>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 12px; font-size: 0.75rem; color: var(--text-dim);">
              <span>Less</span>
              <div style="display: flex; gap: 4px; align-items: center;">
                <div style="width:10px; height:10px; background: rgba(255,255,255,0.05); border-radius:2px;"></div>
                <div style="width:10px; height:10px; background: #0e4429; border-radius:2px;"></div>
                <div style="width:10px; height:10px; background: #006d32; border-radius:2px;"></div>
                <div style="width:10px; height:10px; background: #26a641; border-radius:2px;"></div>
                <div style="width:10px; height:10px; background: #39d353; border-radius:2px;"></div>
              </div>
              <span>More</span>
            </div>
          </div>

        </div>

      </div>

      <!-- Motivational Quote -->
      <div id="motivational-quote"></div>

    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p>Placement Quest • Zero-Backend DSA Progress Tracker • Deployable on GitHub Pages</p>
    </div>
  </footer>

  <script src="js/store.js"></script>
  <script src="js/app.js"></script>
  <script src="js/progress.js"></script>
</body>
</html>
